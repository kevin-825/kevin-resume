name: Release Pre-compiled Resume Artifacts

on:
  push:
    branches:
      - main
  workflow_dispatch:

# 赋予流水线自动创建和修改 Release 的写权限
permissions:
  contents: write

jobs:
  deploy-release:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Compress Output Directory
        run: |
          # 把整个 rendercv_output 文件夹打成一个 zip 压缩包，方便 HR 一键下载全套格式
          zip -r resume_all_formats.zip rendercv_output/

      - name: 3. Publish to GitHub Releases (覆盖更新)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest  # 永远绑定在 latest 游标上，保持热更新
          name: "Latest Resume Artifacts (最新版全套简历产物)"
          body: |
            这是本地编译完成并同步推送到云端的最新简历全套附件。
            - `Kevin_Aimaier_CV.pdf` : 独立 PDF 简历（点击下方附件直接下载）
            - `resume_all_formats.zip` : 包含 HTML、Markdown 及图片全格式压缩包
          files: |
            rendercv_output/Kevin_Aimaier_CV.pdf
            resume_all_formats.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 官方自带密钥，无需手动配 Token