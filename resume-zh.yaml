    skills:
      - label: 编程语言
        details: C (8 年底层与驱动实战), Python, Bash Shell, Matlab/Simulink, JIM tcl, JSON/YAML, powershell.
      - label: 处理器架构
        details: 深入掌握 RISC-V, ARMv7/v8-M, AArch64 以及 Xtensa DSP 指令集架构；精通多种中断控制模型 (CLINT/PLIC/AIA, NVIC/GIC)、特权/异常模型 (Machine/User mode, EL0-EL3) 及内存保护单元 (PMP/MPU, MMU 与 Cache 一致性).
      - label: 芯片底层开发
        details: 具备多家芯片原厂 SoC 开发经验，熟悉内部总线 (AHB/APB, Matrix/Arbiter)；熟悉 FPGA 硅前/硅后 Bring-up 验证；熟练开发 BootROM/Bootloader 及底层 HAL 驱动 (涵盖 I2C, SPI, UART, WDT, DMA, NOR/NAND, DDR 控制器等).
      - label: 操作系统内核
        details: 具备丰富的 RTOS (FreeRTOS, LiteOS) 及 Linux 内核实战经验；深入理解内核任务调度 (CFS/FIFO/RR)、内存寻址与管理、同步原语及 VFS/sysfs 子系统；熟练掌握 Linux 字符设备驱动、设备树 (Device Tree)、构建系统 (Buildroot, Kconfig) 及系统初始化流程 (U-boot, initrd, systemd).
      - label: 调试与工具链
        details: 精通 GNU 工具链 (GCC, GDB, nm, objdump) 及 CMake/Makefile 构建；具备丰富的底层 Debug 经验 (Trace, 内存踩踏/泄漏, Coredump, 宕机现场分析)；熟练应用 QEMU 模拟器、Docker 容器化开发以及 CI/CD (GitLab, Jenkins) 自动化流程.
      - label: 综合与进阶
        details: 熟练运用 Generative AI (Gemini Pro, Copilot) 进行辅助编程与复杂问题排查；具备极强的全英文原版技术文献解析与自主学习能力 (持续跟进 MIT OCW, Linux Foundation 等前沿硬核课程).

    experience:
      - company: 合肥君正科技股份有限公司
        position: 嵌入式软件工程师
        start_date: 2024-05
        end_date: 2025-01
        location: 合肥/上海
        highlights:
          - 参与自研异构 AI MCU SoC（RISC-V 大小核架构 + TNPU）硅前验证。在极度缺乏 FPGA 验证资源（8-10人共用2台，周末无休）且无 JTAG 调试环境的情况下，力排众议推进 JTAG 模块集成，并配合 SoC 部门耗时一月修复 GDB 断链问题，使 JTAG 稳定可用。
          - 负责 RISC-V PLIC 控制器中断嵌套驱动研发。利用 QEMU 模拟器及 FPGA 运行验证，成功排查出 SoC 部门提供的子系统中断号偏移的硬件级 Bug。
          - 研发 Cache 驱动及汇编级 Spinlock。重新适配 FreeRTOS，修复任务初始化导致的栈踩踏 Bug 及临界区中断关闭恢复 Bug，协助解决自旋锁死锁。
          - 搭建基于 Docker 的静态 OpenOCD 环境及 GDB init 脚本。利用 GDB 反汇编及内存现场分析，成功定位困扰算法部门一个月的紧急 Bug（TNPU 越界写坏大核中断向量表）。适配浮点向量寄存器中断上下文保存。
          - **离职原因：** 加班严重，研发环境缺乏基本 Debug 手段。

      - company: 博士视听系统(上海)有限公司 (Bose)
        position: 嵌入式软件工程师
        start_date: 2024-05
        end_date: 2024-06
        location: 上海
        highlights:
          - 负责可穿戴设备、蓝牙耳机等消费电子产品的上层组件开发与适配。
          - **离职原因：** 公司核心团队在美国，需频繁倒时差（晚上10-11点）开会，岗位匹配度低，自愿离职。

      - company: 上海物骐微电子有限公司
        position: 嵌入式软件工程师
        start_date: 2021-01
        end_date: 2024-01
        location: 上海
        highlights:
          - 核心参与华为 Julu2 项目，在 WQ7036 SoC (RISC-V + Xtensa HiFi5 DSP) 多核异构平台上，完成 OpenHarmony LiteOS 与 FreeRTOS 的系统级移植及底层外设驱动研发，助力三条产品线成功量产。
          - 利用 WDT、NMI、PMP 等硬件机制设计并实现高可靠性异常检测/Coredump 系统，精准捕获栈溢出、零地址访问及线程死锁等错误。
          - 负责 SoC 硅前 FPGA 验证及 Bring-up，开发 BootROM、Bootloader 及底层核心外设驱动 (包含 Cache, DMA, SFC Flash, DDR, I2C, SPI 等)。
          - 攻坚复杂系统级难题，解决 DSP 子系统非预期重启、缺乏重启寄存器上下文时的宕机分析，以及 UART 在高负载下的异常挂死问题。
          - **离职原因：** 合同 3 年期满未续签，主要原因为加班严重。

      - company: 湖北恒隆企业集团上海汽车电子研发有限公司
        position: 嵌入式软件工程师
        start_date: 2019-04
        end_date: 2020-07
        location: 上海
        highlights:
          - 基于 NXP S32K14x 平台开发 EPS 系统存储服务模块驱动，遵循 AUTOSAR 4.x 架构与 ISO 26262 功能安全标准。
          - 运用 C 语言为 AUTOSAR OS 研发模拟 EEPROM 驱动 (基于 NAND Flash)，实现高寿命磨损均衡算法以确保 20 年数据保持。
          - 基于 UDS 和 CAN 协议完成存储服务模块单元测试，利用 Python 开发自动化配置文件生成工具链。
          - **离职原因：** 后期同事流失严重，加班急剧变多。

      - company: 易兆微电子 (杭州) 有限公司
        position: 嵌入式软件工程师
        start_date: 2018-03
        end_date: 2019-04
        location: 杭州/上海
        highlights:
          - 为 ARM Cortex-M0 MCU 开发底层外设驱动 (SPI, I2C, PWM, ADC)，完成陀螺仪 (MPU-6050) 及电池监控模块驱动开发。
          - 利用 Ellisys 蓝牙协议分析仪进行抓包，诊断并解决蓝牙设备的连接丢失问题。
          - 引入数学统计方法 (极大似然估计与贝叶斯公式) 处理蓝牙 RSSI 数据序列，开发防丢设备的高精度距离估算算法。
          - **离职原因：** 发展前景有限，能学到的底层技能有限。

      - company: 中国铁建重工集团有限公司新疆分公司
        position: 现场技术支持
        start_date: 2017-07
        end_date: 2017-12
        location: 乌鲁木齐
        highlights:
          - 参与产品学习，协助工程任务，并在现场提供技术支持。
          - **离职原因：** 专业不匹配及对工作内容缺乏兴趣，工作 5 个月后自愿离职。
    

